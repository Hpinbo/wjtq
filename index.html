<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>商家好评 · 一键跳转</title>
    <script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>
    <style>
        /* 样式代码（请自行保留之前的样式，或使用下面简化版） */
        body { font-family: system-ui; padding: 20px; background: #f5f7fa; }
        .review-card { background: white; border-radius: 20px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .copy-btn { background: #e0e0e0; border: none; border-radius: 40px; padding: 8px 16px; cursor: pointer; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: white; padding: 8px 16px; border-radius: 40px; display: none; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; visibility: hidden; }
        .modal.show { visibility: visible; }
        .modal-content { background: white; border-radius: 24px; padding: 24px; width: 280px; text-align: center; }
        .app-btn { background: #007aff; color: white; padding: 12px; margin: 12px 0; border-radius: 40px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="reviewsContainer">加载中...</div>
    <div class="toast" id="toastMsg"></div>
    <div class="modal" id="platformModal">
        <div class="modal-content">
            <div>选择平台</div>
            <div class="app-btn" id="chooseDouyin">抖音</div>
            <div class="app-btn" id="chooseMeituan">美团</div>
            <div id="closeModal" style="margin-top:12px; color:#888; cursor:pointer;">取消</div>
        </div>
    </div>

    <script>
        const CLOUD_ENV = 'zp111-6gl1npyo592dd6e5';
        let cloudApp = null;
        let currentReviews = [];
        let selectedReview = null;

        // 获取 URL 中的 shopId
        const urlParams = new URLSearchParams(window.location.search);
        const shopId = urlParams.get('shopId') || 'billiard_001';

        async function initCloud() {
            cloudApp = cloudbase.init({ env: CLOUD_ENV });
            await cloudApp.auth().signInAnonymously();
        }

        async function loadReviews() {
            const res = await cloudApp.callFunction({
                name: 'getFrontendData',
                data: { shopId }
            });
            if (res.result.code === 0) {
                currentReviews = res.result.data.reviews;
                renderReviews();
            } else {
                document.getElementById('reviewsContainer').innerHTML = '<div>加载失败</div>';
            }
        }

        function renderReviews() {
            const container = document.getElementById('reviewsContainer');
            if (!currentReviews.length) {
                container.innerHTML = '<div>暂无好评</div>';
                return;
            }
            let html = '';
            currentReviews.forEach(item => {
                html += `
                    <div class="review-card" data-id="${item.id}" data-text="${escapeHtml(item.text)}">
                        <span>${escapeHtml(item.text)}</span>
                        <button class="copy-btn">复制</button>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function showToast(msg) {
            const toast = document.getElementById('toastMsg');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2000);
        }

        async function copyText(text) {
            await navigator.clipboard.writeText(text);
            showToast('复制成功');
        }

        async function jump(platform) {
            const res = await cloudApp.callFunction({
                name: 'scfhelloworld',
                data: { platform, ua: navigator.userAgent }
            });
            const { mode, sequence, fallback, message } = res.result;
            if (mode === 'guide') {
                alert(message);
                return;
            }
            if (sequence && sequence.length) {
                for (let item of sequence) {
                    if (item.type === 'universal') {
                        window.location.href = item.url;
                    } else {
                        const iframe = document.createElement('iframe');
                        iframe.style.display = 'none';
                        iframe.src = item.url;
                        document.body.appendChild(iframe);
                        setTimeout(() => iframe.remove(), 500);
                    }
                }
                setTimeout(() => {
                    if (confirm('未成功唤起APP，是否前往网页版？')) {
                        window.location.href = fallback;
                    }
                }, 2500);
            } else {
                window.location.href = fallback;
            }
        }

        document.getElementById('reviewsContainer').addEventListener('click', (e) => {
            const btn = e.target.closest('.copy-btn');
            if (!btn) return;
            const card = btn.closest('.review-card');
            const id = card.dataset.id;
            const text = card.dataset.text;
            selectedReview = { id, text };
            document.getElementById('platformModal').classList.add('show');
        });

        document.getElementById('chooseDouyin').onclick = async () => {
            if (selectedReview) {
                await copyText(selectedReview.text);
                // 此处可调用云函数删除该好评（如果需要）
                document.getElementById('platformModal').classList.remove('show');
                await jump('douyin');
            }
        };
        document.getElementById('chooseMeituan').onclick = async () => {
            if (selectedReview) {
                await copyText(selectedReview.text);
                document.getElementById('platformModal').classList.remove('show');
                await jump('meituan');
            }
        };
        document.getElementById('closeModal').onclick = () => {
            document.getElementById('platformModal').classList.remove('show');
        };

        (async () => {
            await initCloud();
            await loadReviews();
        })();
    </script>
</body>
</html>
