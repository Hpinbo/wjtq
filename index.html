<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>美团商家页 - 一键跳转</title>
    <style>
        body { text-align: center; font-family: system-ui; padding: 20px; }
        button { background: #007aff; color: white; border: none; padding: 14px 28px; border-radius: 40px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <button id="jumpBtn">打开美团商家页</button>
    <script>
        // 👇👇👇 请将这里替换为你提取出的真实链接 👇👇👇
        const MEITUAN_DEEP_LINK = "imeituan://www.meituan.com/poi/1685933593";

        document.getElementById('jumpBtn').addEventListener('click', () => {
            window.location.href = MEITUAN_DEEP_LINK;
            setTimeout(() => {
                if (!document.hidden) {
                    alert("请确保已安装美团App，并允许浏览器打开其他应用。");
                }
            }, 2000);
        });
    </script>
</body>
</html>
