<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>跳转测试 - 品牌优化版</title>
    <style>
        body {
            padding: 20px;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto;
            background: #f5f7fa;
            text-align: center;
        }
        button {
            display: block;
            width: 100%;
            max-width: 300px;
            margin: 20px auto;
            padding: 16px;
            font-size: 18px;
            border-radius: 40px;
            border: none;
            background: #007aff;
            color: white;
            cursor: pointer;
        }
        .log {
            background: #fff;
            border-radius: 12px;
            padding: 12px;
            margin-top: 20px;
            font-size: 12px;
            font-family: monospace;
            text-align: left;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        /* 引导浮层样式 */
        .guide-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .guide-card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            max-width: 280px;
            margin: 20px;
            color: #333;
        }
        .guide-card p {
            font-size: 16px;
            margin-bottom: 20px;
            white-space: pre-line;
            line-height: 1.5;
        }
        .guide-card button {
            background: #007aff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 16px;
            margin: 0 auto;
            width: auto;
        }
        @media (prefers-color-scheme: dark) {
            .guide-card { background: #1e1e1e; color: white; }
            .guide-card p { color: #ddd; }
        }
    </style>
</head>
<body>
    <h2>深度链接测试（品牌优化版）</h2>
    <button id="douyinBtn">📱 打开抖音商家页</button>
    <button id="meituanBtn">📱 打开美团商家页</button>
    <div class="log" id="log">等待操作...</div>

    <!-- 引导浮层 -->
    <div id="guideOverlay" class="guide-overlay">
        <div class="guide-card">
            <p id="guideMessage">引导信息</p>
            <button onclick="closeGuide()">我知道了</button>
        </div>
    </div>

    <script>
        // ---------- 配置区（请替换为真实的商家ID）----------
        const DOUYIN_POI_ID = '75561483463443107990';
        const MEITUAN_POI_ID = '1685933593';
        // -------------------------------------------------

        const logDiv = document.getElementById('log');
        function log(msg) {
            const p = document.createElement('div');
            p.textContent = `${new Date().toLocaleTimeString()} - ${msg}`;
            logDiv.appendChild(p);
            console.log(msg);
        }

        // 增强的引导函数（支持品牌特定提示）
        function showGuideMessage(msg, platform, fallbackUrl) {
            const guideMsg = document.querySelector('#guideMessage');
            let finalMsg = msg;
            // 根据平台和设备品牌，添加更具体的提示
            const ua = navigator.userAgent;
            const brand = /Vivo|vivo/.test(ua) ? 'vivo' :
                          /OPPO|oppo/.test(ua) ? 'OPPO' :
                          /Mi|Redmi/.test(ua) ? '小米' :
                          /SM-|Samsung/.test(ua) ? '三星' : '';
            if (brand) {
                finalMsg += `\n\n若无法跳转，请尝试：\n1. 在手机「设置」-「应用管理」中找到当前浏览器\n2. 开启「关联启动」或「打开其他应用」权限\n3. 返回本页面再次点击`;
            }
            if (guideMsg) guideMsg.innerText = finalMsg;
            document.getElementById('guideOverlay').style.display = 'flex';
        }

        function closeGuide() {
            document.getElementById('guideOverlay').style.display = 'none';
        }

        // 环境检测
        const ua = navigator.userAgent;
        const isAndroid = /Android/i.test(ua);
        const isIOS = /iPhone|iPad|iPod/i.test(ua);
        const isWeChat = /MicroMessenger/i.test(ua);
        const isQQ = /QQ\//i.test(ua);
        const isAlipay = /AlipayClient/i.test(ua);
        log(`环境: ${isAndroid ? 'Android' : isIOS ? 'iOS' : '其他'}, 微信:${isWeChat}, QQ:${isQQ}, 支付宝:${isAlipay}`);

        // 通用延时降级函数
        function delayFallback(fn, timeout) {
            let timer = setTimeout(() => {
                log('降级执行: 跳转备用链接');
                fn();
            }, timeout);
            const onVisibility = () => {
                if (document.hidden) {
                    clearTimeout(timer);
                    document.removeEventListener('visibilitychange', onVisibility);
                    window.removeEventListener('blur', onVisibility);
                    log('✅ App已成功唤起，取消降级');
                }
            };
            document.addEventListener('visibilitychange', onVisibility);
            window.addEventListener('blur', onVisibility);
            return timer;
        }

        // 抖音跳转（Universal Link 优先 + 品牌策略）
        function jumpToDouyin() {
            const universalLink = `https://www.douyin.com/poi/${DOUYIN_POI_ID}`;
            const scheme = `snssdk1128://poi/detail?id=${DOUYIN_POI_ID}&from=webview&refer=web`;
            const intent = `intent://poi/detail?id=${DOUYIN_POI_ID}&from=webview&refer=web#Intent;scheme=snssdk1128;package=com.ss.android.ugc.aweme;S.browser_fallback_url=${encodeURIComponent(universalLink)};end;`;
            const fallbackUrl = universalLink;

            // 微信等内置浏览器直接引导
            if (isWeChat || isQQ || isAlipay) {
                showGuideMessage('请在右上角菜单选择“在浏览器中打开”', 'douyin', fallbackUrl);
                return;
            }

            if (isIOS) {
                log('iOS: 使用 Universal Link');
                window.location.href = universalLink;
                delayFallback(() => {
                    log('iOS 降级: 尝试 Scheme');
                    window.location.href = scheme;
                }, 800);
                delayFallback(() => {
                    log('最终降级: 打开网页');
                    window.location.href = fallbackUrl;
                }, 3000);
            } else if (isAndroid) {
                // 品牌识别（简化版，云函数中会更细致，这里仅做演示）
                const brand = /Vivo|vivo/.test(ua) ? 'vivo' :
                              /OPPO|oppo/.test(ua) ? 'oppo' :
                              /Mi|Redmi/.test(ua) ? 'xiaomi' :
                              /SM-|Samsung/.test(ua) ? 'samsung' : '';
                log(`Android 品牌: ${brand || '通用'}`);

                // 品牌优化策略
                if (brand === 'vivo' || brand === 'oppo') {
                    log('OPPO/vivo: 仅尝试 Universal Link');
                    window.location.href = universalLink;
                    delayFallback(() => {
                        log('降级: 打开网页');
                        window.location.href = fallbackUrl;
                    }, 2000);
                } else if (brand === 'xiaomi') {
                    log('小米: 尝试 Universal Link → Intent → Scheme');
                    window.location.href = universalLink;
                    delayFallback(() => {
                        const iframe = document.createElement('iframe');
                        iframe.style.display = 'none';
                        iframe.src = intent;
                        document.body.appendChild(iframe);
                        setTimeout(() => iframe.remove(), 1000);
                    }, 800);
                    delayFallback(() => {
                        window.location.href = scheme;
                    }, 1500);
                    delayFallback(() => {
                        window.location.href = fallbackUrl;
                    }, 3000);
                } else {
                    // 默认策略
                    window.location.href = universalLink;
                    delayFallback(() => {
                        const iframe = document.createElement('iframe');
                        iframe.style.display = 'none';
                        iframe.src = intent;
                        document.body.appendChild(iframe);
                        setTimeout(() => iframe.remove(), 1000);
                    }, 800);
                    delayFallback(() => {
                        window.location.href = scheme;
                    }, 1500);
                    delayFallback(() => {
                        window.location.href = fallbackUrl;
                    }, 3000);
                }
            } else {
                window.location.href = fallbackUrl;
            }
        }

        // 美团跳转（同样加入品牌优化）
        function jumpToMeituan() {
            const universalLink = `https://i.meituan.com/poi/${MEITUAN_POI_ID}`;
            const scheme = `imeituan://www.meituan.com/poi/${MEITUAN_POI_ID}`;
            const intent = `intent://poi/${MEITUAN_POI_ID}#Intent;scheme=imeituan;package=com.sankuai.meituan;S.browser_fallback_url=${encodeURIComponent(universalLink)};end;`;
            const fallbackUrl = universalLink;

            if (isWeChat || isQQ || isAlipay) {
                showGuideMessage('请在右上角菜单选择“在浏览器中打开”', 'meituan', fallbackUrl);
                return;
            }

            if (isIOS) {
                log('iOS: 使用 Universal Link');
                window.location.href = universalLink;
                delayFallback(() => {
                    log('iOS 降级: Scheme');
                    window.location.href = scheme;
                }, 800);
                delayFallback(() => {
                    window.location.href = fallbackUrl;
                }, 3000);
            } else if (isAndroid) {
                const brand = /Vivo|vivo/.test(ua) ? 'vivo' :
                              /OPPO|oppo/.test(ua) ? 'oppo' :
                              /Mi|Redmi/.test(ua) ? 'xiaomi' : '';
                if (brand === 'vivo' || brand === 'oppo') {
                    window.location.href = universalLink;
                    delayFallback(() => window.location.href = fallbackUrl, 2000);
                } else {
                    window.location.href = universalLink;
                    delayFallback(() => {
                        const iframe = document.createElement('iframe');
                        iframe.style.display = 'none';
                        iframe.src = intent;
                        document.body.appendChild(iframe);
                        setTimeout(() => iframe.remove(), 1000);
                    }, 800);
                    delayFallback(() => {
                        window.location.href = scheme;
                    }, 1500);
                    delayFallback(() => {
                        window.location.href = fallbackUrl;
                    }, 3000);
                }
            } else {
                window.location.href = fallbackUrl;
            }
        }

        // 按钮绑定
        document.getElementById('douyinBtn').onclick = () => {
            log('用户点击抖音按钮');
            jumpToDouyin();
        };
        document.getElementById('meituanBtn').onclick = () => {
            log('用户点击美团按钮');
            jumpToMeituan();
        };
    </script>
</body>
</html>
