<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>跳转测试-极简版</title>
    <style>
        body { padding: 20px; font-family: sans-serif; background: #f0f0f0; }
        button { display: block; width: 100%; padding: 20px; margin: 20px 0; font-size: 20px; border-radius: 12px; border: none; background: #007aff; color: white; cursor: pointer; }
        .log { background: #fff; border-radius: 8px; padding: 12px; margin-top: 20px; font-size: 14px; font-family: monospace; white-space: pre-wrap; word-break: break-all; max-height: 400px; overflow-y: auto; }
        .title { font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <button id="btnDouyin">📱 测试抖音跳转</button>
    <button id="btnMeituan">📱 测试美团跳转</button>
    <div class="log">
        <div class="title">📋 操作日志：</div>
        <div id="logContent">等待操作...</div>
    </div>

    <script>
        const logDiv = document.getElementById('logContent');
        function log(msg) {
            console.log(msg);
            logDiv.innerHTML += `<div>${new Date().toLocaleTimeString()} - ${msg}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        // 获取shopId参数
        const urlParams = new URLSearchParams(window.location.search);
        const shopId = urlParams.get('shopId') || 'billiard_001';
        log(`初始化完成，shopId = ${shopId}`);

        // 检测环境
        const ua = navigator.userAgent;
        log(`User Agent: ${ua}`);
        const isIOS = /iPhone|iPad|iPod/.test(ua);
        const isAndroid = /Android/.test(ua);
        const isWeChat = /MicroMessenger/.test(ua);
        log(`设备: ${isIOS ? 'iOS' : (isAndroid ? 'Android' : '其他')}`);
        log(`是否微信内置浏览器: ${isWeChat ? '是' : '否'}`);

        // 抖音跳转
        function jumpDouyin() {
            log('===== 开始尝试抖音跳转 =====');
            const douyinScheme = `snssdk1128://poi/detail/?id=${shopId}`;
            const douyinIntent = `intent://poi/detail/?id=${shopId}#Intent;scheme=snssdk1128;package=com.ss.android.ugc.aweme;S.browser_fallback_url=https%3A%2F%2Fwww.douyin.com%2Fpoi%2F${shopId};end;`;
            const fallbackUrl = `https://www.douyin.com/poi/${shopId}`;
            
            if (isIOS) {
                log('iOS: 尝试 universal link 和 scheme');
                // iOS 尝试 universal link
                const link = document.createElement('a');
                link.href = `https://www.douyin.com/poi/${shopId}`;
                link.style.display = 'none';
                document.body.appendChild(link);
                link.click();
                setTimeout(() => document.body.removeChild(link), 500);
                // 降级
                setTimeout(() => {
                    log('iOS 降级: 直接跳转 scheme');
                    window.location.href = douyinScheme;
                }, 800);
                setTimeout(() => {
                    log('最终降级: 跳转网页');
                    window.location.href = fallbackUrl;
                }, 3000);
            } else {
                // Android: 优先使用 intent（通过 iframe 或 location）
                log('Android: 尝试 intent 协议');
                const iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                iframe.src = douyinIntent;
                document.body.appendChild(iframe);
                setTimeout(() => document.body.removeChild(iframe), 800);
                
                // 降级到 scheme
                setTimeout(() => {
                    log('Android 降级: 直接跳转 scheme');
                    window.location.href = douyinScheme;
                }, 1000);
                // 最终降级
                setTimeout(() => {
                    log('最终降级: 跳转网页');
                    window.location.href = fallbackUrl;
                }, 3500);
            }
        }

        // 美团跳转
        function jumpMeituan() {
            log('===== 开始尝试美团跳转 =====');
            const meituanScheme = `imeituan://www.meituan.com/poi/${shopId}`;
            const meituanIntent = `intent://poi/${shopId}#Intent;scheme=imeituan;package=com.sankuai.meituan;S.browser_fallback_url=https%3A%2F%2Fi.meituan.com%2Fpoi%2F${shopId};end;`;
            const fallbackUrl = `https://i.meituan.com/poi/${shopId}`;
            
            if (isIOS) {
                log('iOS: 尝试 universal link');
                const link = document.createElement('a');
                link.href = `https://i.meituan.com/poi/${shopId}`;
                link.style.display = 'none';
                document.body.appendChild(link);
                link.click();
                setTimeout(() => document.body.removeChild(link), 500);
                setTimeout(() => {
                    log('iOS 降级: scheme');
                    window.location.href = meituanScheme;
                }, 800);
                setTimeout(() => {
                    log('最终降级: 网页');
                    window.location.href = fallbackUrl;
                }, 3000);
            } else {
                log('Android: 尝试 intent');
                const iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                iframe.src = meituanIntent;
                document.body.appendChild(iframe);
                setTimeout(() => document.body.removeChild(iframe), 800);
                setTimeout(() => {
                    log('Android 降级: scheme');
                    window.location.href = meituanScheme;
                }, 1000);
                setTimeout(() => {
                    log('最终降级: 网页');
                    window.location.href = fallbackUrl;
                }, 3500);
            }
        }

        document.getElementById('btnDouyin').onclick = () => {
            log('用户点击抖音按钮');
            jumpDouyin();
        };
        document.getElementById('btnMeituan').onclick = () => {
            log('用户点击美团按钮');
            jumpMeituan();
        };
    </script>
</body>
</html>
