<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>跳转测试 - 精准优化版</title>
    <style>
        body { padding: 20px; font-family: system-ui; background: #f5f7fa; text-align: center; }
        button { display: block; width: 100%; max-width: 300px; margin: 20px auto; padding: 16px; font-size: 18px; border-radius: 40px; border: none; background: #007aff; color: white; cursor: pointer; }
        .log { background: #fff; border-radius: 12px; padding: 12px; margin-top: 20px; font-size: 12px; font-family: monospace; text-align: left; max-height: 400px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
        .guide-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 10000; }
        .guide-card { background: white; border-radius: 20px; padding: 24px; text-align: center; max-width: 280px; margin: 20px; }
        .guide-card p { font-size: 16px; margin-bottom: 20px; white-space: pre-line; }
        .guide-card button { background: #007aff; color: white; border: none; padding: 10px 20px; border-radius: 30px; margin: 0 auto; width: auto; }
    </style>
</head>
<body>
    <h2>跳转测试 - 精准优化版</h2>
    <button id="douyinBtn">📱 抖音商家页</button>
    <button id="meituanBtn">📱 美团商家页</button>
    <div class="log" id="log">等待操作...</div>
    <div id="guideOverlay" class="guide-overlay">
        <div class="guide-card"><p id="guideMessage"></p><button onclick="closeGuide()">我知道了</button></div>
    </div>

    <script>
        const DOUYIN_POI_ID = '75561483463443107990';
        const MEITUAN_POI_ID = '1685933593';

        const logDiv = document.getElementById('log');
        function log(msg) {
            const p = document.createElement('div');
            p.textContent = `${new Date().toLocaleTimeString()} - ${msg}`;
            logDiv.appendChild(p);
            console.log(msg);
        }

        function showGuide(msg) {
            document.getElementById('guideMessage').innerText = msg;
            document.getElementById('guideOverlay').style.display = 'flex';
        }
        function closeGuide() { document.getElementById('guideOverlay').style.display = 'none'; }

        const ua = navigator.userAgent;
        const isAndroid = /Android/i.test(ua);
        const isIOS = /iPhone|iPad|iPod/i.test(ua);
        const isWeChat = /MicroMessenger/i.test(ua);
        const isQQ = /QQ\//i.test(ua);
        log(`环境: ${isAndroid ? 'Android' : isIOS ? 'iOS' : 'PC'}, 微信:${isWeChat}, QQ:${isQQ}`);

        // 抖音跳转（优化版）
        function jumpDouyin() {
            if (isWeChat || isQQ) {
                showGuide('请在右上角菜单选择“在浏览器中打开”');
                return;
            }

            // 方案一：aweme:// 协议（优先推荐）
            const awemeUrl = `aweme://poi/detail?id=${DOUYIN_POI_ID}&from=webview&refer=web`;
            // 方案二：snssdk1128://lynxview（特殊格式）
            const lynxviewUrl = `snssdk1128://lynxview?surl=${encodeURIComponent(`https://www.douyin.com/poi/${DOUYIN_POI_ID}`)}`;
            // 方案三：snssdk1128:// 标准格式（备选）
            const schemeUrl = `snssdk1128://poi/detail?id=${DOUYIN_POI_ID}&from=webview&refer=web`;
            const universalUrl = `https://www.douyin.com/poi/${DOUYIN_POI_ID}`;

            if (isIOS) {
                log('iOS: 优先使用 Universal Link');
                window.location.href = universalUrl;
                setTimeout(() => { log('降级: Scheme'); window.location.href = schemeUrl; }, 800);
                setTimeout(() => { log('最终降级: 网页'); window.location.href = universalUrl; }, 2500);
            } else if (isAndroid) {
                log('Android: 优先使用 aweme:// 协议');
                const iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                iframe.src = awemeUrl;
                document.body.appendChild(iframe);
                setTimeout(() => iframe.remove(), 500);

                // 降级：尝试 lynxview 格式
                setTimeout(() => {
                    log('降级: 尝试 lynxview 格式');
                    const iframe2 = document.createElement('iframe');
                    iframe2.style.display = 'none';
                    iframe2.src = lynxviewUrl;
                    document.body.appendChild(iframe2);
                    setTimeout(() => iframe2.remove(), 500);
                }, 800);

                // 再降级：尝试标准 scheme
                setTimeout(() => {
                    log('降级: 尝试标准 scheme');
                    window.location.href = schemeUrl;
                }, 1300);

                // 最终降级
                setTimeout(() => {
                    log('最终降级: 打开网页');
                    window.location.href = universalUrl;
                }, 2500);
            } else {
                window.location.href = universalUrl;
            }
        }

        // 美团跳转（优化版）
        function jumpMeituan() {
            if (isWeChat || isQQ) {
                showGuide('请在右上角菜单选择“在浏览器中打开”');
                return;
            }

            // 标准 Intent URL（指定完整HTTP路径）
            const intentUrl = `intent://www.meituan.com/poi/${MEITUAN_POI_ID}#Intent;scheme=imeituan;package=com.sankuai.meituan;end;`;
            const schemeUrl = `imeituan://www.meituan.com/poi/${MEITUAN_POI_ID}`;
            const universalUrl = `https://i.meituan.com/poi/${MEITUAN_POI_ID}`;

            if (isIOS) {
                log('iOS: 优先 Universal Link');
                window.location.href = universalUrl;
                setTimeout(() => { window.location.href = schemeUrl; }, 800);
                setTimeout(() => { window.location.href = universalUrl; }, 2500);
            } else if (isAndroid) {
                log('Android: 优先使用标准 Intent');
                // 先检测 Intent 是否可用
                log('尝试 Intent 跳转...');
                const iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                iframe.src = intentUrl;
                document.body.appendChild(iframe);
                setTimeout(() => iframe.remove(), 500);

                // 降级：尝试 Scheme
                setTimeout(() => {
                    log('降级: 尝试 Scheme');
                    window.location.href = schemeUrl;
                }, 800);
                // 最终降级到网页
                setTimeout(() => {
                    log('最终降级: 打开网页');
                    window.location.href = universalUrl;
                }, 2500);
            } else {
                window.location.href = universalUrl;
            }
        }

        document.getElementById('douyinBtn').onclick = () => { log('点击抖音'); jumpDouyin(); };
        document.getElementById('meituanBtn').onclick = () => { log('点击美团'); jumpMeituan(); };
    </script>
</body>
</html>
