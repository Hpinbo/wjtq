<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="full-screen" content="yes">
    <meta name="screen-orientation" content="portrait">
    <title>商家好评 · 一键跳转</title>
    <link rel="preconnect" href="https://static.cloudbase.net">
    <script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            padding-bottom: env(safe-area-inset-bottom);
            padding-top: env(safe-area-inset-top);
        }
        .glass-container {
            max-width: 480px;
            width: 100%;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(18px);
            border-radius: 36px;
            padding: 24px 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .reviews-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
        }
        .review-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 16px 18px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.08);
            transition: transform 0.2s;
            animation: cardPop 0.3s ease;
        }
        .review-card:active {
            transform: scale(0.98);
        }
        @keyframes cardPop {
            0% { opacity: 0; transform: translateY(15px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .review-text {
            font-size: 1rem;
            line-height: 1.4;
            color: #1e2a3a;
            font-weight: 480;
            flex: 1;
            padding-right: 12px;
        }
        .copy-btn {
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 0.9rem;
            font-weight: 550;
            color: #2c3e50;
            backdrop-filter: blur(4px);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .copy-btn:active {
            transform: scale(0.92);
            background: rgba(0, 0, 0, 0.1);
        }
        .copy-btn::after {
            content: "📋";
            font-size: 1rem;
        }
        .browser-tip {
            background: rgba(255, 230, 200, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 30px;
            padding: 10px 16px;
            margin: 10px 0 16px;
            font-size: 0.85rem;
            text-align: center;
            color: #1e2a3a;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .contact-footer {
            margin-top: 16px;
            text-align: center;
            padding: 18px 10px 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            color: #5a6e7c;
            font-size: 0.95rem;
        }
        .contact-email {
            background: rgba(255, 255, 255, 0.7);
            display: inline-block;
            padding: 8px 28px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            margin-top: 8px;
            font-size: 0.9rem;
            color: #1e2a3a;
            text-decoration: none;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-glass {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(30px);
            border-radius: 48px;
            padding: 32px 24px;
            width: 300px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transform: scale(0.9);
            transition: transform 0.2s;
            text-align: center;
        }
        .modal-overlay.show .modal-glass {
            transform: scale(1);
        }
        .modal-title {
            color: #1e2a3a;
            font-size: 1.4rem;
            margin-bottom: 20px;
        }
        .app-options {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 16px;
        }
        .app-btn {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 60px;
            padding: 16px;
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: #1e2a3a;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.08);
        }
        .app-btn:active {
            transform: scale(0.96);
        }
        .cancel-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 12px;
            margin-top: 8px;
            color: #5a6e7c;
            cursor: pointer;
        }
        .empty-message {
            text-align: center;
            padding: 30px 0;
            color: #5a6e7c;
            font-style: italic;
            font-size: 1.2rem;
        }
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 0.9rem;
            display: none;
            z-index: 2000;
            backdrop-filter: blur(10px);
        }
        @media (prefers-color-scheme: dark) {
            body { background: #121212; }
            .glass-container { background: rgba(40,40,40,0.7); border-color: rgba(255,255,255,0.1); }
            .review-card { background: rgba(60,60,60,0.7); border-color: rgba(255,255,255,0.1); }
            .review-text { color: #f0f0f0; }
            .copy-btn { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); color: #ccc; }
            .browser-tip { background: rgba(80,60,30,0.7); border-color: rgba(255,255,255,0.1); color: #f0f0f0; }
            .contact-footer { border-color: rgba(255,255,255,0.1); color: #cccccc; }
            .contact-email { background: rgba(60,60,60,0.7); border-color: rgba(255,255,255,0.1); color: #f0f0f0; }
            .modal-glass { background: rgba(40,40,40,0.8); border-color: rgba(255,255,255,0.2); }
            .modal-title { color: #f0f0f0; }
            .app-btn { background: rgba(60,60,60,0.7); border-color: rgba(255,255,255,0.2); color: #f0f0f0; }
            .cancel-btn { border-color: rgba(255,255,255,0.2); color: #cccccc; }
        }
    </style>
</head>
<body>
    <div class="toast-message" id="toastMessage"></div>

    <div class="glass-container">
        <div id="reviewsContainer" class="reviews-list">
            <div class="empty-message">加载中...</div>
        </div>
        <div class="browser-tip" id="browserTip">✨ 点击复制 → 选择APP → 自动跳转商家页面</div>
        <div class="contact-footer">
            <span>📬 商务合作 · 好评宝</span>
            <a href="tel:15617743996" class="contact-email">📞15617743996</a>
        </div>
    </div>

    <div class="modal-overlay" id="appChoiceModal">
        <div class="modal-glass">
            <div class="modal-title">平台选择</div>
            <div class="app-options">
                <div class="app-btn" id="chooseDouyin">
                    <i class="fab fa-tiktok"></i> 抖音
                </div>
                <div class="app-btn" id="chooseMeituan">
                    <i class="fas fa-store"></i> 美团
                </div>
            </div>
            <div class="cancel-btn" id="closeModal">取消</div>
        </div>
    </div>

    <script>
        (function() {
            const CLOUD_ENV = 'zp111-6gl1npyo592dd6e5';
            const COLLECTION_NAME = 'wjtq';
            let db = null;
            let currentReviews = [];
            let selectedReviewId = null;

            // 设备判断
            const ua = navigator.userAgent.toLowerCase();
            const isIOS = /iphone|ipad|ipod/.test(ua);
            const isIOS185 = isIOS && /(18_5|18\.5|185)/.test(ua);
            const isHarmony = /harmony|openharmony|huawei|honor/.test(ua);
            const isAndroid = /android/.test(ua) && !isHarmony;
            const isXiaomi = /xiaomi|miui|redmi/.test(ua); // 小米专用判断
            const isWeChat = ua.includes('micromessenger');

            const toastMessage = document.getElementById('toastMessage');
            const reviewsContainer = document.getElementById('reviewsContainer');
            const modalOverlay = document.getElementById('appChoiceModal');
            const chooseDouyin = document.getElementById('chooseDouyin');
            const chooseMeituan = document.getElementById('chooseMeituan');

            // 提示
            function showToast(msg) {
                toastMessage.style.display = 'block';
                toastMessage.textContent = msg;
                setTimeout(() => toastMessage.style.display = 'none', 1800);
            }

            // ==============================================
            // 🔥 小米 / 红米 复制终极修复（全机型兼容）
            // ==============================================
            function copyForXiaomi(text) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                
                // 小米关键修复：不设置 opacity:0，不设置 fixed 极端隐藏
                textarea.style.position = 'fixed';
                textarea.style.left = '10px';
                textarea.style.top = '10px';
                textarea.style.width = '20px';
                textarea.style.height = '20px';
                textarea.style.opacity = '0.1';
                textarea.style.zIndex = '-999';
                
                document.body.appendChild(textarea);
                textarea.focus();
                textarea.select();
                textarea.setSelectionRange(0, textarea.value.length);
                
                let success = false;
                try {
                    success = document.execCommand('copy');
                } catch (e) {}
                
                document.body.removeChild(textarea);
                return success;
            }

            async function copyText(text) {
                if (isXiaomi) {
                    return copyForXiaomi(text);
                }

                try {
                    await navigator.clipboard.writeText(text);
                    return true;
                } catch (e) {
                    return copyForXiaomi(text);
                }
            }

            // ================= 云开发 =================
            async function initCloud() {
                let wait = 0;
                while (typeof cloudbase === 'undefined' && wait < 30) {
                    await new Promise(r => setTimeout(r, 200));
                    wait++;
                }
                if (typeof cloudbase === 'undefined') return false;
                try {
                    const app = cloudbase.init({ env: CLOUD_ENV, region: 'ap-shanghai' });
                    await app.auth().signInAnonymously();
                    db = app.database();
                    return true;
                } catch (err) {
                    return false;
                }
            }

            async function loadReviews() {
                if (!db) return [];
                try {
                    const res = await db.collection(COLLECTION_NAME).get();
                    return res.data.map(doc => ({ id: doc._id, text: doc.text }));
                } catch (err) {
                    return [];
                }
            }

            async function deleteReviewById(id) {
                if (!db) return false;
                try {
                    await db.collection(COLLECTION_NAME).doc(id).remove();
                    return true;
                } catch (err) {
                    return false;
                }
            }

            function renderReviews(reviews) {
                if (!reviews.length) {
                    reviewsContainer.innerHTML = '<div class="empty-message">✨ 所有好评已用完</div>';
                    return;
                }
                let html = '';
                const show = reviews.slice(0, 5);
                show.forEach(item => {
                    html += `
                    <div class="review-card">
                        <span class="review-text">${item.text}</span>
                        <button class="copy-btn" data-id="${item.id}">复制</button>
                    </div>`;
                });
                reviewsContainer.innerHTML = html;
            }

            // ==============================================
            // 跳转引擎（不变，保持最优）
            // ==============================================
            function openApp(config, appName) {
                let launched = false;
                const onHidden = () => { if (document.hidden) { launched = true; } };
                document.addEventListener('visibilitychange', onHidden);

                if (isIOS185) {
                    window.location.href = config.universal;
                    setTimeout(() => { if (!launched) window.location.href = config.ios; }, 600);
                    return;
                }
                if (isIOS) {
                    window.location.href = config.universal;
                    setTimeout(() => { if (!launched) window.location.href = config.ios; }, 500);
                    return;
                }
                if (isHarmony) {
                    const a = document.createElement('a');
                    a.href = config.universal;
                    a.style.display = 'none';
                    document.body.appendChild(a);
                    a.click();
                    setTimeout(() => document.body.removeChild(a), 200);
                    setTimeout(() => { if (!launched) window.location.href = config.android; }, 600);
                    return;
                }
                if (isAndroid) {
                    window.location.href = config.scheme;
                    setTimeout(() => { if (!launched) window.location.href = config.android; }, 500);
                    return;
                }
                window.location.href = config.universal;
            }

            function jumpToDouyin() {
                openApp({
                    scheme: 'snssdk1128://',
                    universal: 'https://www.douyin.com/',
                    ios: 'https://apps.apple.com/cn/app/id1142116800',
                    android: 'https://www.douyin.com/download'
                }, '抖音');
            }

            function jumpToMeituan() {
                openApp({
                    scheme: 'imeituan://',
                    universal: 'https://www.meituan.com/',
                    ios: 'https://apps.apple.com/cn/app/id423080450',
                    android: 'https://about.meituan.com/app'
                }, '美团');
            }

            // ================= 点击交互 =================
            reviewsContainer.addEventListener('click', (e) => {
                const btn = e.target.closest('.copy-btn');
                if (!btn) return;
                selectedReviewId = btn.dataset.id;
                modalOverlay.classList.add('show');
            });

            chooseDouyin.addEventListener('click', async () => {
                const rev = currentReviews.find(r => r.id === selectedReviewId);
                if (rev) {
                    await copyText(rev.text);
                    showToast('✅ 复制成功');
                    await deleteReviewById(selectedReviewId);
                    currentReviews = currentReviews.filter(r => r.id !== selectedReviewId);
                    renderReviews(currentReviews);
                }
                modalOverlay.classList.remove('show');
                jumpToDouyin();
            });

            chooseMeituan.addEventListener('click', async () => {
                const rev = currentReviews.find(r => r.id === selectedReviewId);
                if (rev) {
                    await copyText(rev.text);
                    showToast('✅ 复制成功');
                    await deleteReviewById(selectedReviewId);
                    currentReviews = currentReviews.filter(r => r.id !== selectedReviewId);
                    renderReviews(currentReviews);
                }
                modalOverlay.classList.remove('show');
                jumpToMeituan();
            });

            document.getElementById('closeModal').onclick = () => {
                modalOverlay.classList.remove('show');
                selectedReviewId = null;
            };

            // 启动
            (async () => {
                await initCloud();
                currentReviews = await loadReviews();
                renderReviews(currentReviews);
            })();

        })();
    </script>
</body>
</html>
