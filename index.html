<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>商家好评 · 一键跳转</title>
    <link rel="preconnect" href="https://static.cloudbase.net">
    <script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .glass-container {
            max-width: 480px;
            width: 100%;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(18px);
            border-radius: 36px;
            padding: 24px 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .reviews-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
        }
        .review-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 16px 18px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.08);
            transition: transform 0.2s;
            animation: cardPop 0.3s ease;
        }
        .review-card:active {
            transform: scale(0.98);
        }
        @keyframes cardPop {
            0% { opacity: 0; transform: translateY(15px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .review-text {
            font-size: 1rem;
            line-height: 1.4;
            color: #1e2a3a;
            font-weight: 480;
            flex: 1;
            padding-right: 12px;
        }
        .copy-btn {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 0.9rem;
            font-weight: 550;
            color: #2c3e50;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            flex-shrink: 0;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.08);
        }
        .copy-btn::after {
            content: "📋";
            font-size: 1rem;
        }
        .browser-tip {
            background: rgba(255, 230, 200, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 30px;
            padding: 10px 16px;
            margin: 10px 0 16px;
            font-size: 0.85rem;
            text-align: center;
            color: #1e2a3a;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .device-tip {
            background: rgba(79, 158, 255, 0.15);
            border-left: 4px solid #4f9eff;
            padding: 12px;
            margin: 12px 0;
            border-radius: 12px;
            font-size: 0.8rem;
            display: none;
        }
        .contact-footer {
            margin-top: 16px;
            text-align: center;
            padding: 18px 10px 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            color: #5a6e7c;
            font-size: 0.95rem;
        }
        .contact-email {
            background: rgba(255, 255, 255, 0.7);
            display: inline-block;
            padding: 8px 28px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            margin-top: 8px;
            font-size: 0.9rem;
            color: #1e2a3a;
            text-decoration: none;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-glass {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(30px);
            border-radius: 48px;
            padding: 32px 24px;
            width: 300px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transform: scale(0.9);
            transition: transform 0.2s;
            text-align: center;
        }
        .modal-overlay.show .modal-glass {
            transform: scale(1);
        }
        .modal-title {
            color: #1e2a3a;
            font-size: 1.4rem;
            margin-bottom: 20px;
        }
        .app-options {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 16px;
        }
        .app-btn {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 60px;
            padding: 16px;
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: #1e2a3a;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.08);
        }
        .app-btn:active {
            transform: scale(0.96);
        }
        .cancel-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 12px;
            margin-top: 8px;
            color: #5a6e7c;
            cursor: pointer;
        }
        .empty-message {
            text-align: center;
            padding: 30px 0;
            color: #5a6e7c;
            font-style: italic;
            font-size: 1.2rem;
        }
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 0.9rem;
            display: none;
            z-index: 2000;
            backdrop-filter: blur(10px);
        }
        .debug-panel {
            background: #f0f0f0;
            border: 1px solid #ccc;
            padding: 10px;
            margin-top: 20px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-family: monospace;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }
        @media (prefers-color-scheme: dark) {
            body { background: #121212; }
            .glass-container { background: rgba(40,40,40,0.7); border-color: rgba(255,255,255,0.1); }
            .review-card { background: rgba(60,60,60,0.7); border-color: rgba(255,255,255,0.1); }
            .review-text { color: #f0f0f0; }
            .copy-btn { background: rgba(60,60,60,0.7); border-color: rgba(255,255,255,0.1); color: #cccccc; }
            .browser-tip { background: rgba(80,60,30,0.7); border-color: rgba(255,255,255,0.1); color: #f0f0f0; }
            .device-tip { background: rgba(79,158,255,0.25); }
            .contact-footer { border-color: rgba(255,255,255,0.1); color: #cccccc; }
            .contact-email { background: rgba(60,60,60,0.7); border-color: rgba(255,255,255,0.1); color: #f0f0f0; }
            .modal-glass { background: rgba(40,40,40,0.8); border-color: rgba(255,255,255,0.2); }
            .modal-title { color: #f0f0f0; }
            .app-btn { background: rgba(60,60,60,0.7); border-color: rgba(255,255,255,0.2); color: #f0f0f0; }
            .cancel-btn { border-color: rgba(255,255,255,0.2); color: #cccccc; }
            .debug-panel { background: #2c2c2c; border-color: #444; color: #eee; }
        }
    </style>
</head>
<body>
    <div class="toast-message" id="toastMessage"></div>

    <div class="glass-container">
        <div id="reviewsContainer" class="reviews-list">
            <div class="empty-message">加载中...</div>
        </div>
        <div class="browser-tip" id="browserTip">✨ 点击复制 → 选择APP → 自动跳转商家页面</div>
        <div class="device-tip" id="deviceTip"></div>
        <div class="contact-footer">
            <span>📬 商务合作 · 好评宝</span>
            <a href="tel:15617743996" class="contact-email">📞15617743996</a>
        </div>
        <div class="debug-panel" id="debugPanel"></div>
    </div>

    <div class="modal-overlay" id="appChoiceModal">
        <div class="modal-glass">
            <div class="modal-title">平台选择</div>
            <div class="app-options">
                <div class="app-btn" id="chooseDouyin">
                    <i class="fab fa-tiktok"></i> 抖音
                </div>
                <div class="app-btn" id="chooseMeituan">
                    <i class="fas fa-store"></i> 美团
                </div>
            </div>
            <div class="cancel-btn" id="closeModal">取消</div>
        </div>
    </div>

    <script>
        (function() {
            // ================= 环境配置 =================
            const CLOUD_ENV = 'good-reviews-3g35hh0i28b88e1b';
            const COLLECTION_NAME = 'wjtq';
            let db = null;
            let isCloudReady = false;
            let currentReviews = [];
            let selectedReviewId = null;

            // 调试日志
            const debugPanel = document.getElementById('debugPanel');
            function log(msg) {
                const time = new Date().toLocaleTimeString();
                debugPanel.style.display = 'block';
                debugPanel.innerHTML += `[${time}] ${msg}<br>`;
                console.log(msg);
                debugPanel.scrollTop = debugPanel.scrollHeight;
            }
            log('页面加载开始');

            // 设备检测
            const ua = navigator.userAgent.toLowerCase();
            const isHarmony = ua.includes('harmony') || ua.includes('openharmony');
            const isIOS = /iphone|ipad|ipod/.test(ua) && !isHarmony;
            const isAndroid = /android/.test(ua) && !isHarmony;
            const isVivo = ua.includes('vivo') || ua.includes('iqoo');
            log(`设备检测: Harmony=${isHarmony}, iOS=${isIOS}, Android=${isAndroid}, vivo=${isVivo}`);

            if (isVivo) {
                const tipDiv = document.getElementById('deviceTip');
                tipDiv.innerHTML = '📱 若抖音未自动跳转，请尝试手动打开APP粘贴文案。';
                tipDiv.style.display = 'block';
            }

            // DOM 元素
            const reviewsContainer = document.getElementById('reviewsContainer');
            const modalOverlay = document.getElementById('appChoiceModal');
            const closeModalBtn = document.getElementById('closeModal');
            const chooseDouyin = document.getElementById('chooseDouyin');
            const chooseMeituan = document.getElementById('chooseMeituan');
            const toastMessage = document.getElementById('toastMessage');

            function showToast(msg, duration = 3000) {
                toastMessage.style.display = 'block';
                toastMessage.textContent = msg;
                setTimeout(() => {
                    toastMessage.style.display = 'none';
                }, duration);
                log(`Toast: ${msg}`);
            }

            async function copyText(text) {
                try {
                    await navigator.clipboard.writeText(text);
                    log('Clipboard API 复制成功');
                    return true;
                } catch (err) {
                    log('Clipboard API 失败，尝试 fallback');
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    textarea.style.position = 'fixed';
                    textarea.style.opacity = '0';
                    document.body.appendChild(textarea);
                    textarea.select();
                    const success = document.execCommand('copy');
                    document.body.removeChild(textarea);
                    log(`fallback 复制结果: ${success}`);
                    return success;
                }
            }

            // ================= 云开发初始化 =================
            async function initCloud() {
                log('开始等待 SDK 加载...');
                let wait = 0;
                while (typeof cloudbase === 'undefined' && wait < 30) {
                    await new Promise(r => setTimeout(r, 200));
                    wait++;
                }
                if (typeof cloudbase === 'undefined') {
                    log('SDK 加载超时');
                    reviewsContainer.innerHTML = '<div class="empty-message">SDK 加载失败，请刷新重试</div>';
                    return false;
                }
                log('SDK 已加载');
                try {
                    log(`调用 cloudbase.init({ env: ${CLOUD_ENV}, region: 'ap-shanghai' })`);
                    const app = cloudbase.init({ env: CLOUD_ENV, region: 'ap-shanghai' });
                    log('调用 app.auth().signInAnonymously()');
                    await app.auth().signInAnonymously();
                    log('匿名登录成功');
                    db = app.database();
                    log('数据库实例获取成功');
                    // 测试连接
                    log('测试查询 sales 集合...');
                    const test = await db.collection('sales').limit(1).get();
                    log(`sales 集合查询成功，返回 ${test.data.length} 条数据`);
                    isCloudReady = true;
                    return true;
                } catch (err) {
                    log(`初始化失败: ${err.message || err}`);
                    console.error(err);
                    reviewsContainer.innerHTML = `<div class="empty-message">数据库初始化失败: ${err.message || '未知错误'}<br>请检查安全域名和权限</div>`;
                    return false;
                }
            }

            async function loadReviews() {
                if (!db) {
                    log('db 未初始化，无法加载');
                    return [];
                }
                log(`开始查询集合 ${COLLECTION_NAME}`);
                try {
                    const res = await db.collection(COLLECTION_NAME).get();
                    log(`查询成功，返回 ${res.data.length} 条文案`);
                    if (res.data.length > 0) {
                        log(`示例文案: ${JSON.stringify(res.data[0]).substring(0, 100)}`);
                    } else {
                        log('集合为空，请检查数据库是否有数据');
                    }
                    const docs = res.data || [];
                    return docs.map(doc => ({ id: doc._id, text: doc.text }));
                } catch (err) {
                    log(`查询失败: ${err.message || err}`);
                    console.error(err);
                    return [];
                }
            }

            async function deleteReviewById(id) {
                if (!db) return false;
                try {
                    await db.collection(COLLECTION_NAME).doc(id).remove();
                    log(`删除文案 ${id} 成功`);
                    return true;
                } catch (err) {
                    log(`删除失败: ${err.message}`);
                    return false;
                }
            }

            function renderReviews(reviews) {
                log(`渲染 ${reviews.length} 条文案`);
                if (!reviews.length) {
                    reviewsContainer.innerHTML = '<div class="empty-message">✨ 所有好评已被用完，请联系管理员添加~</div>';
                    return;
                }
                let listToShow = reviews;
                if (reviews.length > 5) {
                    const shuffled = [...reviews];
                    for (let i = shuffled.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                    }
                    listToShow = shuffled.slice(0, 5);
                }
                let html = '';
                listToShow.forEach(item => {
                    html += `
                        <div class="review-card">
                            <span class="review-text">${escapeHtml(item.text)}</span>
                            <button class="copy-btn" data-id="${item.id}">复制</button>
                        </div>
                    `;
                });
                reviewsContainer.innerHTML = html;
                log(`渲染完成，显示 ${listToShow.length} 条`);
            }

            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }

            // ================= 统一跳转引擎 =================
            function tryOpenApp(sequence, fallbackUrl, appName) {
                let appLaunched = false;
                let iframe = null;
                let timer = null;

                const onVisibility = () => {
                    if (document.hidden) {
                        appLaunched = true;
                        cleanUp();
                        showToast(`✅ ${appName} APP已打开`, 2000);
                    }
                };
                const onBlur = () => {
                    appLaunched = true;
                    cleanUp();
                    showToast(`✅ ${appName} APP已打开`, 2000);
                };
                document.addEventListener('visibilitychange', onVisibility);
                window.addEventListener('blur', onBlur);

                function cleanUp() {
                    document.removeEventListener('visibilitychange', onVisibility);
                    window.removeEventListener('blur', onBlur);
                    if (iframe && iframe.parentNode) iframe.parentNode.removeChild(iframe);
                    iframe = null;
                    if (timer) clearTimeout(timer);
                }

                function tryNext(index) {
                    if (appLaunched || index >= sequence.length) return;
                    const item = sequence[index];
                    
                    if (item.type === 'scheme') {
                        if (isAndroid || isHarmony) {
                            iframe = document.createElement('iframe');
                            iframe.style.display = 'none';
                            iframe.src = item.url;
                            document.body.appendChild(iframe);
                            setTimeout(() => {
                                if (iframe && iframe.parentNode) iframe.parentNode.removeChild(iframe);
                                iframe = null;
                            }, 500);
                        } else {
                            window.location.href = item.url;
                        }
                    } else if (item.type === 'intent') {
                        iframe = document.createElement('iframe');
                        iframe.style.display = 'none';
                        iframe.src = item.url;
                        document.body.appendChild(iframe);
                        setTimeout(() => {
                            if (iframe && iframe.parentNode) iframe.parentNode.removeChild(iframe);
                            iframe = null;
                        }, 500);
                    } else if (item.type === 'universal') {
                        const link = document.createElement('a');
                        link.href = item.url;
                        link.style.display = 'none';
                        document.body.appendChild(link);
                        link.click();
                        setTimeout(() => document.body.removeChild(link), 200);
                    }
                    setTimeout(() => tryNext(index + 1), 400);
                }

                tryNext(0);
                timer = setTimeout(() => {
                    if (!appLaunched) {
                        cleanUp();
                        if (confirm(`未成功唤起${appName} APP，是否前往网页版查看？`)) {
                            window.location.href = fallbackUrl;
                        }
                    }
                }, 3000);
            }

            // ========== 抖音唤起（最简，回到上次页面） ==========
            function jumpToDouyin() {
                const config = {
                    schemes: [
                        'snssdk1128://',   // 最简形式，直接唤起抖音，回到之前页面
                        'aweme://'
                    ],
                    intent: 'intent://#Intent;package=com.ss.android.ugc.aweme;scheme=snssdk1128;end;',
                    universalLink: 'https://www.douyin.com/',
                    fallbackUrl: 'https://v.douyin.com/xVZOcGCPqIY/'
                };

                let sequence = [];
                
                if (isIOS) {
                    sequence = [
                        { type: 'universal', url: config.universalLink },
                        { type: 'scheme', url: config.schemes[0] }
                    ];
                } else if (isHarmony) {
                    sequence = [
                        { type: 'universal', url: config.universalLink },
                        { type: 'intent', url: config.intent },
                        ...config.schemes.map(s => ({ type: 'scheme', url: s }))
                    ];
                } else if (isVivo) {
                    // vivo 优先使用 scheme，备选 intent
                    sequence = [
                        { type: 'scheme', url: config.schemes[0] },
                        { type: 'intent', url: config.intent },
                        { type: 'scheme', url: config.schemes[1] },
                        { type: 'universal', url: config.universalLink }
                    ];
                } else {
                    sequence = [
                        ...config.schemes.map(s => ({ type: 'scheme', url: s })),
                        { type: 'intent', url: config.intent },
                        { type: 'universal', url: config.universalLink }
                    ];
                }
                tryOpenApp(sequence, config.fallbackUrl, '抖音');
            }

            // ========== 美团唤起 ==========
            function jumpToMeituan() {
                const meituanPoiId = '1755904985';
                const config = {
                    schemes: [
                        `imeituan://www.meituan.com/poi/${meituanPoiId}`,
                        `imeituan://www.meituan.com/shop/${meituanPoiId}`,
                        `imeituan://www.meituan.com/poi?id=${meituanPoiId}`,
                        `imeituan://`
                    ],
                    intent: `intent://poi/${meituanPoiId}#Intent;scheme=imeituan;package=com.sankuai.meituan;end;`,
                    universalLink: `https://i.meituan.com/poi/${meituanPoiId}`,
                    fallbackUrl: `http://dpurl.cn/rYQkSEfz`
                };

                let sequence = [];
                
                if (isIOS) {
                    sequence = [
                        { type: 'universal', url: config.universalLink },
                        ...config.schemes.map(s => ({ type: 'scheme', url: s }))
                    ];
                } else if (isHarmony) {
                    sequence = [
                        { type: 'universal', url: config.universalLink },
                        { type: 'intent', url: config.intent },
                        ...config.schemes.map(s => ({ type: 'scheme', url: s }))
                    ];
                } else {
                    sequence = [
                        ...config.schemes.map(s => ({ type: 'scheme', url: s })),
                        { type: 'intent', url: config.intent },
                        { type: 'universal', url: config.universalLink }
                    ];
                }
                tryOpenApp(sequence, config.fallbackUrl, '美团');
            }

            // ================= 主流程 =================
            async function init() {
                const ok = await initCloud();
                if (!ok) return;
                const reviews = await loadReviews();
                if (reviews.length === 0) {
                    reviewsContainer.innerHTML = '<div class="empty-message">✨ 暂无好评数据，请联系管理员添加</div>';
                } else {
                    currentReviews = reviews;
                    renderReviews(currentReviews);
                }
                if (currentReviews.length === 20) showToast('📢 库存剩余 20 条', 5000);
                else if (currentReviews.length === 10) showToast('📢 库存剩余 10 条', 5000);
                else if (currentReviews.length === 5) showToast('📢 库存只剩 5 条啦！', 5000);
            }

            reviewsContainer.addEventListener('click', async (e) => {
                const btn = e.target.closest('.copy-btn');
                if (!btn) return;
                const id = btn.getAttribute('data-id');
                if (id) {
                    selectedReviewId = id;
                    modalOverlay.classList.add('show');
                }
            });

            chooseDouyin.addEventListener('click', async () => {
                if (!selectedReviewId) { modalOverlay.classList.remove('show'); return; }
                const review = currentReviews.find(r => r.id === selectedReviewId);
                if (review) {
                    await copyText(review.text);
                    await deleteReviewById(selectedReviewId);
                    currentReviews = currentReviews.filter(r => r.id !== selectedReviewId);
                    renderReviews(currentReviews);
                }
                modalOverlay.classList.remove('show');
                jumpToDouyin();
            });

            chooseMeituan.addEventListener('click', async () => {
                if (!selectedReviewId) { modalOverlay.classList.remove('show'); return; }
                const review = currentReviews.find(r => r.id === selectedReviewId);
                if (review) {
                    await copyText(review.text);
                    await deleteReviewById(selectedReviewId);
                    currentReviews = currentReviews.filter(r => r.id !== selectedReviewId);
                    renderReviews(currentReviews);
                }
                modalOverlay.classList.remove('show');
                jumpToMeituan();
            });

            closeModalBtn.addEventListener('click', () => {
                modalOverlay.classList.remove('show');
                selectedReviewId = null;
            });
            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) modalOverlay.classList.remove('show');
            });

            init();
        })();
    </script>
</body>
</html>
