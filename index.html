<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>抖音深层链接测试</title>
    <style>
        body {
            padding: 20px;
            font-family: system-ui;
            background: #f5f7fa;
            text-align: center;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        button {
            background: #007aff;
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        button:active {
            transform: scale(0.96);
        }
        .log {
            margin-top: 20px;
            font-size: 12px;
            color: #666;
            font-family: monospace;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div>
        <button id="jumpBtn">🚀 直接打开抖音商家页</button>
        <div class="log" id="log">点击按钮测试，观察是否直接唤起抖音并进入商家详情页</div>
    </div>
    <script>
        // 你提取到的完整深层链接
        const DEEP_LINK = "snssdk1128://poi/detail/?id=7556202622550542376&track_enter_detail=1&enter_from=link&enter_method=&extra_session_params=%7B%22life_extra_info%22%3A%22%7B%5C%22life_share_ext%5C%22%3A%5C%22wyo80n%5C%5C%5C%2FOK4Wb5DZs%2B711YAOeAy7xa1MWX%5C%5C%5C%2F6D%5C%5C%5C%2F%2B7gVW9qY3j1Pm6jbJ8B47Gxno6%2BVw%2ByAoRDv10T%5C%5CnVV9Ajteem8DwbAbmwzSBqTCZr6DEE6WjBscfWXRxgrU3LA89OxX6dMsAtr%2B69%2BVJU0WAgsPy6gbJ%5C%5CnRoQox2JUxCPeBhsE4mXMEseJU4jGWzVU3KFUa%5C%5C%5C%2F8VLe4nLwbrT1yPORic2FJ%5C%5C%5C%2FTdjPOE5S2Pr%5C%5C%5C%2FaXzE%5C%5CnmDc%5C%5C%5C%2FPI4rGUwAUyPXvOxZrPYDAo8nFbKcA4a9bKBSwKyyeOmbk7WFC1dw8i4qdYxkhQLkyHE%3D%5C%5Cn%5C%22%7D%22%7D&life_service_refer=life_service_web&biz_code=general&zlink=https%3A%2F%2Fz.douyin.com%2F6qoT&zlink_click_time=1775302564091";

        const logDiv = document.getElementById('log');
        function log(msg) {
            logDiv.innerHTML = msg + "<br>" + logDiv.innerHTML;
            console.log(msg);
        }

        document.getElementById('jumpBtn').addEventListener('click', () => {
            log("尝试唤起抖音: " + DEEP_LINK.substring(0, 80) + "...");
            window.location.href = DEEP_LINK;

            // 降级：2秒后如果页面未隐藏，提示可能失败
            let timer = setTimeout(() => {
                if (!document.hidden) {
                    log("未检测到App切换，可能未安装抖音或权限限制");
                    alert("请确保已安装抖音App，并在系统设置中允许浏览器打开其他应用。");
                }
            }, 2000);

            const onVisibility = () => {
                if (document.hidden) {
                    clearTimeout(timer);
                    log("✅ 页面已隐藏，抖音App已成功唤起");
                    document.removeEventListener('visibilitychange', onVisibility);
                }
            };
            document.addEventListener('visibilitychange', onVisibility);
        });
    </script>
</body>
</html>
