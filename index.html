<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>抖音商家页跳转测试</title>
</head>
<body>
    <button id="jumpBtn">打开商家页面</button>
    <div id="log"></div>

    <script>
        // 我们提取到的官方短链
        const OFFICIAL_URL = "https://v.douyin.com/if/XXXXXXXX/"; // 请替换为真实的官方短链
        const DOUYIN_POI_ID = '75561483463443107990';
        const UNIVERSAL_LINK = `https://www.douyin.com/poi/${DOUYIN_POI_ID}`;
        const logDiv = document.getElementById('log');

        function log(msg) {
            logDiv.innerHTML += `<p>${new Date().toLocaleTimeString()} - ${msg}</p>`;
            console.log(msg);
        }

        function isAndroid() {
            return /Android/i.test(navigator.userAgent);
        }

        document.getElementById('jumpBtn').addEventListener('click', () => {
            log(`尝试跳转，当前环境: ${isAndroid() ? 'Android' : 'iOS'}`);
            if (isAndroid()) {
                log(`Android: 使用官方短链跳转: ${OFFICIAL_URL}`);
                window.location.href = OFFICIAL_URL;
            } else {
                log(`iOS: 使用Universal Link跳转: ${UNIVERSAL_LINK}`);
                window.location.href = UNIVERSAL_LINK;
            }

            // 设置降级方案：如果3秒后页面没有隐藏（说明唤起可能失败），则显示提示
            const timer = setTimeout(() => {
                log('未检测到App切换，可能未安装抖音或跳转被拦截');
                alert('请确保已安装抖音App。\n如已安装，请在系统设置中允许浏览器打开抖音。');
            }, 3000);

            // 监听页面隐藏（App被成功唤起时，页面会进入后台）
            const onVisibilityChange = () => {
                if (document.hidden) {
                    clearTimeout(timer);
                    log('页面已隐藏，抖音App可能已成功唤起');
                    document.removeEventListener('visibilitychange', onVisibilityChange);
                }
            };
            document.addEventListener('visibilitychange', onVisibilityChange);
        });
    </script>
</body>
</html>
