<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>商家好评 · 一键跳转</title>
    <link rel="preconnect" href="https://static.cloudbase.net">
    <script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .glass-container {
            max-width: 480px;
            width: 100%;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(18px);
            border-radius: 36px;
            padding: 24px 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .reviews-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
        }
        .review-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 16px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.08);
            transition: transform 0.2s;
            animation: cardPop 0.3s ease;
        }
        .review-card:active {
            transform: scale(0.98);
        }
        @keyframes cardPop {
            0% { opacity: 0; transform: translateY(15px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .review-text {
            font-size: 1rem;
            line-height: 1.4;
            color: #1e2a3a;
            font-weight: 480;
            flex: 1;
            padding-right: 12px;
        }
        .copy-btn {
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 0.9rem;
            font-weight: 550;
            color: #2c3e50;
            backdrop-filter: blur(4px);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .copy-btn:active {
            transform: scale(0.92);
            background: rgba(0, 0, 0, 0.1);
        }
        .copy-btn::after {
            content: "📋";
            font-size: 1rem;
        }
        .browser-tip {
            background: rgba(255, 230, 200, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 30px;
            padding: 10px 16px;
            margin: 10px 0 16px;
            font-size: 0.85rem;
            text-align: center;
            color: #1e2a3a;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .contact-footer {
            margin-top: 16px;
            text-align: center;
            padding: 18px 10px 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            color: #5a6e7c;
            font-size: 0.95rem;
        }
        .contact-email {
            background: rgba(255, 255, 255, 0.7);
            display: inline-block;
            padding: 8px 28px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            margin-top: 8px;
            font-size: 0.9rem;
            color: #1e2a3a;
            text-decoration: none;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-glass {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(30px);
            border-radius: 48px;
            padding: 32px 24px;
            width: 300px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transform: scale(0.9);
            transition: transform 0.2s;
            text-align: center;
        }
        .modal-overlay.show .modal-glass {
            transform: scale(1);
        }
        .modal-title {
            color: #1e2a3a;
            font-size: 1.4rem;
            margin-bottom: 20px;
        }
        .app-options {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 16px;
        }
        .app-btn {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 60px;
            padding: 16px;
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: #1e2a3a;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.08);
        }
        .app-btn:active {
            transform: scale(0.96);
        }
        .cancel-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 12px;
            margin-top: 8px;
            color: #5a6e7c;
            cursor: pointer;
        }
        .empty-message {
            text-align: center;
            padding: 30px 0;
            color: #5a6e7c;
            font-style: italic;
            font-size: 1.2rem;
        }
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 0.9rem;
            display: none;
            z-index: 2000;
            backdrop-filter: blur(10px);
        }
        @media (prefers-color-scheme: dark) {
            body { background: #121212; }
            .glass-container { background: rgba(40,40,40,0.7); border-color: rgba(255,255,255,0.1); }
            .review-card { background: rgba(60,60,60,0.7); border-color: rgba(255,255,255,0.1); }
            .review-text { color: #f0f0f0; }
            .copy-btn { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); color: #ccc; }
            .browser-tip { background: rgba(80,60,30,0.7); border-color: rgba(255,255,255,0.1); color: #f0f0f0; }
            .contact-footer { border-color: rgba(255,255,255,0.1); color: #cccccc; }
            .contact-email { background: rgba(60,60,60,0.7); border-color: rgba(255,255,255,0.1); color: #f0f0f0; }
            .modal-glass { background: rgba(40,40,40,0.8); border-color: rgba(255,255,255,0.2); }
            .modal-title { color: #f0f0f0; }
            .app-btn { background: rgba(60,60,60,0.7); border-color: rgba(255,255,255,0.2); color: #f0f0f0; }
            .cancel-btn { border-color: rgba(255,255,255,0.2); color: #cccccc; }
        }
    </style>
</head>
<body>
    <div class="toast-message" id="toastMessage"></div>

    <div class="glass-container">
        <div id="reviewsContainer" class="reviews-list">
            <div class="empty-message">加载中...</div>
        </div>
        <div class="browser-tip" id="browserTip">✨ 点击复制 → 选择APP → 自动跳转商家页面</div>
        <div class="contact-footer">
            <span>📬 商务合作 · 砚拓</span>
            <a href="tel:15617743996" class="contact-email">📞15617743996</a>
        </div>
    </div>

    <div class="modal-overlay" id="appChoiceModal">
        <div class="modal-glass">
            <div class="modal-title">平台选择</div>
            <div class="app-options">
                <div class="app-btn" id="chooseDouyin">
                    <i class="fab fa-tiktok"></i> 抖音
                </div>
                <div class="app-btn" id="chooseMeituan">
                    <i class="fas fa-store"></i> 美团
                </div>
            </div>
            <div class="cancel-btn" id="closeModal">取消</div>
        </div>
    </div>

    <script>
        (function() {
            // ================= 环境配置（使用你的新环境ID） =================
            const CLOUD_ENV = 'zp111-6gl1npyo592dd6e5-1404006356';
            const COLLECTION_NAME = 'wjtq';
            let db = null;
            let isCloudReady = false;
            let currentReviews = [];
            let selectedReviewId = null;

            // 商家ID（从URL参数获取，用于跳转抖音/美团详情页）
            const urlParams = new URLSearchParams(window.location.search);
            const shopId = urlParams.get('shopId') || 'billiard_001';
            // 抖音/美团商家ID（与shopId相同，可根据需要映射）
            const douyinPoiId = shopId;
            const meituanPoiId = shopId;

            // 设备检测
            const ua = navigator.userAgent.toLowerCase();
            const isHarmony = ua.includes('harmony') || ua.includes('openharmony');
            const isIOS = /iphone|ipad|ipod/.test(ua) && !isHarmony;
            const isAndroid = /android/.test(ua) && !isHarmony;
            const isVivo = ua.includes('vivo') || ua.includes('iqoo');
            const isWeChat = ua.includes('micromessenger');

            // DOM 元素
            const reviewsContainer = document.getElementById('reviewsContainer');
            const modalOverlay = document.getElementById('appChoiceModal');
            const closeModalBtn = document.getElementById('closeModal');
            const chooseDouyin = document.getElementById('chooseDouyin');
            const chooseMeituan = document.getElementById('chooseMeituan');
            const toastMessage = document.getElementById('toastMessage');

            function showToast(msg, duration = 3000) {
                toastMessage.style.display = 'block';
                toastMessage.textContent = msg;
                setTimeout(() => {
                    toastMessage.style.display = 'none';
                }, duration);
            }

            async function copyText(text) {
                try {
                    await navigator.clipboard.writeText(text);
                    return true;
                } catch (err) {
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    textarea.style.position = 'fixed';
                    textarea.style.opacity = '0';
                    document.body.appendChild(textarea);
                    textarea.select();
                    const success = document.execCommand('copy');
                    document.body.removeChild(textarea);
                    return success;
                }
            }

            // ================= 云开发初始化 =================
            async function initCloud() {
                let wait = 0;
                while (typeof cloudbase === 'undefined' && wait < 30) {
                    await new Promise(r => setTimeout(r, 200));
                    wait++;
                }
                if (typeof cloudbase === 'undefined') {
                    reviewsContainer.innerHTML = '<div class="empty-message">SDK 加载失败，请刷新重试</div>';
                    return false;
                }
                try {
                    const app = cloudbase.init({ env: CLOUD_ENV, region: 'ap-shanghai' });
                    await app.auth().signInAnonymously();
                    db = app.database();
                    isCloudReady = true;
                    return true;
                } catch (err) {
                    console.error(err);
                    reviewsContainer.innerHTML = '<div class="empty-message">数据库初始化失败，请检查安全域名</div>';
                    return false;
                }
            }

            async function loadReviews() {
                if (!db) return [];
                try {
                    const res = await db.collection(COLLECTION_NAME).where({ shopId: shopId }).get();
                    const docs = res.data || [];
                    return docs.map(doc => ({ id: doc._id, text: doc.text }));
                } catch (err) {
                    console.error(err);
                    return [];
                }
            }

            async function deleteReviewById(id) {
                if (!db) return false;
                try {
                    await db.collection(COLLECTION_NAME).doc(id).remove();
                    return true;
                } catch (err) {
                    console.error(err);
                    return false;
                }
            }

            function renderReviews(reviews) {
                if (!reviews.length) {
                    reviewsContainer.innerHTML = '<div class="empty-message">✨ 所有好评已被用完，请联系管理员添加~</div>';
                    return;
                }
                let listToShow = reviews;
                if (reviews.length > 5) {
                    const shuffled = [...reviews];
                    for (let i = shuffled.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                    }
                    listToShow = shuffled.slice(0, 5);
                }
                let html = '';
                listToShow.forEach(item => {
                    html += `
                        <div class="review-card">
                            <span class="review-text">${escapeHtml(item.text)}</span>
                            <button class="copy-btn" data-id="${item.id}">复制</button>
                        </div>
                    `;
                });
                reviewsContainer.innerHTML = html;
            }

            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }

            // ================= 全机型跳转引擎 =================
            function tryOpenApp(sequence, fallbackUrl, appName) {
                let appLaunched = false;
                let iframe = null;
                let timer = null;

                const onVisibility = () => {
                    if (document.hidden) {
                        appLaunched = true;
                        cleanUp();
                        showToast(`✅ ${appName} APP已打开`, 2000);
                    }
                };
                const onBlur = () => {
                    appLaunched = true;
                    cleanUp();
                    showToast(`✅ ${appName} APP已打开`, 2000);
                };
                document.addEventListener('visibilitychange', onVisibility);
                window.addEventListener('blur', onBlur);

                function cleanUp() {
                    document.removeEventListener('visibilitychange', onVisibility);
                    window.removeEventListener('blur', onBlur);
                    if (iframe && iframe.parentNode) iframe.parentNode.removeChild(iframe);
                    iframe = null;
                    if (timer) clearTimeout(timer);
                }

                function tryNext(index) {
                    if (appLaunched || index >= sequence.length) return;
                    const item = sequence[index];
                    
                    if (item.type === 'scheme') {
                        if (isAndroid || isHarmony) {
                            iframe = document.createElement('iframe');
                            iframe.style.display = 'none';
                            iframe.src = item.url;
                            document.body.appendChild(iframe);
                            setTimeout(() => {
                                if (iframe && iframe.parentNode) iframe.parentNode.removeChild(iframe);
                                iframe = null;
                            }, 500);
                        } else {
                            window.location.href = item.url;
                        }
                    } else if (item.type === 'intent') {
                        iframe = document.createElement('iframe');
                        iframe.style.display = 'none';
                        iframe.src = item.url;
                        document.body.appendChild(iframe);
                        setTimeout(() => {
                            if (iframe && iframe.parentNode) iframe.parentNode.removeChild(iframe);
                            iframe = null;
                        }, 500);
                    } else if (item.type === 'universal') {
                        const link = document.createElement('a');
                        link.href = item.url;
                        link.style.display = 'none';
                        document.body.appendChild(link);
                        link.click();
                        setTimeout(() => document.body.removeChild(link), 200);
                    }
                    setTimeout(() => tryNext(index + 1), 400);
                }

                tryNext(0);
                timer = setTimeout(() => {
                    if (!appLaunched) {
                        cleanUp();
                        if (confirm(`未成功唤起${appName} APP，是否前往网页版查看？`)) {
                            window.location.href = fallbackUrl;
                        }
                    }
                }, 3000);
            }

            // ========== 抖音唤起（仿竞品：直接跳转商家详情页） ==========
            function jumpToDouyin() {
                // 使用竞品网站的精确 Scheme 格式
                const douyinScheme = `snssdk1128://poi/detail/?id=${douyinPoiId}`;
                // 备选通用 Scheme
                const altSchemes = [
                    `snssdk1128://feed?url=https://v.douyin.com/xxx`, // 备用
                    `snssdk1128://`
                ];
                const intent = `intent://poi/detail/?id=${douyinPoiId}#Intent;package=com.ss.android.ugc.aweme;scheme=snssdk1128;end;`;
                const universalLink = `https://www.douyin.com/poi/${douyinPoiId}`;
                const fallbackUrl = `https://v.douyin.com/xVZOcGCPqIY/`;

                let sequence = [];
                if (isIOS) {
                    sequence = [
                        { type: 'universal', url: universalLink },
                        { type: 'scheme', url: douyinScheme }
                    ];
                } else if (isHarmony) {
                    sequence = [
                        { type: 'universal', url: universalLink },
                        { type: 'intent', url: intent },
                        { type: 'scheme', url: douyinScheme }
                    ];
                } else if (isVivo) {
                    sequence = [
                        { type: 'scheme', url: douyinScheme },
                        { type: 'intent', url: intent },
                        { type: 'scheme', url: altSchemes[0] },
                        { type: 'universal', url: universalLink }
                    ];
                } else {
                    sequence = [
                        { type: 'scheme', url: douyinScheme },
                        ...altSchemes.map(s => ({ type: 'scheme', url: s })),
                        { type: 'intent', url: intent },
                        { type: 'universal', url: universalLink }
                    ];
                }
                tryOpenApp(sequence, fallbackUrl, '抖音');
            }

            // ========== 美团唤起（使用精确商家详情页 Scheme） ==========
            function jumpToMeituan() {
                // 美团商家详情页 Scheme（根据已知格式）
                const meituanScheme = `imeituan://www.meituan.com/poi/${meituanPoiId}`;
                const altSchemes = [
                    `imeituan://www.meituan.com/shop/${meituanPoiId}`,
                    `imeituan://www.meituan.com/poi?id=${meituanPoiId}`,
                    `imeituan://`
                ];
                const intent = `intent://poi/${meituanPoiId}#Intent;scheme=imeituan;package=com.sankuai.meituan;end;`;
                const universalLink = `https://i.meituan.com/poi/${meituanPoiId}`;
                const fallbackUrl = `http://dpurl.cn/rYQkSEfz`;

                let sequence = [];
                if (isIOS) {
                    sequence = [
                        { type: 'universal', url: universalLink },
                        { type: 'scheme', url: meituanScheme }
                    ];
                } else if (isHarmony) {
                    sequence = [
                        { type: 'universal', url: universalLink },
                        { type: 'intent', url: intent },
                        { type: 'scheme', url: meituanScheme }
                    ];
                } else {
                    sequence = [
                        { type: 'scheme', url: meituanScheme },
                        ...altSchemes.map(s => ({ type: 'scheme', url: s })),
                        { type: 'intent', url: intent },
                        { type: 'universal', url: universalLink }
                    ];
                }
                tryOpenApp(sequence, fallbackUrl, '美团');
            }

            // ================= 微信内特殊处理 =================
            function wechatJump(appName) {
                if (!isWeChat) return false;
                // 微信内尝试使用 WeixinJSBridge 拉起（仅部分版本支持）
                if (typeof WeixinJSBridge !== 'undefined') {
                    const schemaUrl = appName === 'douyin' 
                        ? `snssdk1128://poi/detail/?id=${douyinPoiId}` 
                        : `imeituan://www.meituan.com/poi/${meituanPoiId}`;
                    WeixinJSBridge.invoke('launchApplication', {
                        schemeUrl: schemaUrl
                    }, function(res) {
                        if (res && res.err_msg && res.err_msg.indexOf('ok') === -1) {
                            console.log('微信拉起失败，使用备用方案');
                        }
                    });
                    return true;
                }
                return false;
            }

            // ================= 主流程 =================
            async function init() {
                const ok = await initCloud();
                if (!ok) return;
                const reviews = await loadReviews();
                if (reviews.length === 0) {
                    reviewsContainer.innerHTML = '<div class="empty-message">✨ 暂无好评数据，请联系管理员添加</div>';
                } else {
                    currentReviews = reviews;
                    renderReviews(currentReviews);
                }
                if (currentReviews.length === 20) showToast('📢 库存剩余 20 条', 5000);
                else if (currentReviews.length === 10) showToast('📢 库存剩余 10 条', 5000);
                else if (currentReviews.length === 5) showToast('📢 库存只剩 5 条啦！', 5000);
            }

            reviewsContainer.addEventListener('click', async (e) => {
                const btn = e.target.closest('.copy-btn');
                if (!btn) return;
                const id = btn.getAttribute('data-id');
                if (id) {
                    selectedReviewId = id;
                    modalOverlay.classList.add('show');
                }
            });

            chooseDouyin.addEventListener('click', async () => {
                if (!selectedReviewId) { modalOverlay.classList.remove('show'); return; }
                const review = currentReviews.find(r => r.id === selectedReviewId);
                if (review) {
                    await copyText(review.text);
                    await deleteReviewById(selectedReviewId);
                    currentReviews = currentReviews.filter(r => r.id !== selectedReviewId);
                    renderReviews(currentReviews);
                }
                modalOverlay.classList.remove('show');
                // 微信内特殊处理
                if (isWeChat && wechatJump('douyin')) return;
                jumpToDouyin();
            });

            chooseMeituan.addEventListener('click', async () => {
                if (!selectedReviewId) { modalOverlay.classList.remove('show'); return; }
                const review = currentReviews.find(r => r.id === selectedReviewId);
                if (review) {
                    await copyText(review.text);
                    await deleteReviewById(selectedReviewId);
                    currentReviews = currentReviews.filter(r => r.id !== selectedReviewId);
                    renderReviews(currentReviews);
                }
                modalOverlay.classList.remove('show');
                if (isWeChat && wechatJump('meituan')) return;
                jumpToMeituan();
            });

            closeModalBtn.addEventListener('click', () => {
                modalOverlay.classList.remove('show');
                selectedReviewId = null;
            });
            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) modalOverlay.classList.remove('show');
            });

            init();
        })();
    </script>
</body>
</html>
